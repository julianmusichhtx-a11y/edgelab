name = "edgelab"
main = "src/index.ts"
compatibility_date = "2025-03-27"

# Extended CPU limit — requires Workers Paid plan ($5/mo)
# Gives Gemini up to 5 minutes instead of 30 seconds
[limits]
cpu_ms = 300000

[observability]
enabled = true

# KV Namespaces
[[kv_namespaces]]
binding = "USER_NOTIFICATION"
id = "22cacf90546d48e9af8b2d82f2c69614"

[[kv_namespaces]]
binding = "LINEUP_KV"
id = "22cacf90546d48e9af8b2d82f2c69614"

# Cron triggers — lineup check every 15 min during game windows
# MLB lineups post 1-2 hours before first pitch
# UTC hours 19-23,0-3 = Eastern 3pm-11pm
[triggers]
crons = ["*/15 19-23,0-3 * * *"]
